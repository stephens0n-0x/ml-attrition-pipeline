data:
  url: "https://raw.githubusercontent.com/IBM/employee-attrition-aif360/master/data/emp_attrition.csv"
  target_column: "Attrition"
  test_size: 0.2
  random_state: 42

models:
  random_forest:
    n_estimators: 100
    max_depth: 10
    random_state: 42
  logistic_regression:
    max_iter: 1000
    random_state: 42
  decision_tree:
    max_depth: 8
    random_state: 42

training:
  output_dir: "models"
  cross_val_folds: 5

ollama:
  model: "llama3.2"
  host: "http://localhost:11434"

api:
  host: "0.0.0.0"
  port: 8000